name: bpfcat Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: newinliner,runtimefreegc,simd
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goamd64: v1
            output: bpfcat-linux-amd64
          - goarch: amd64
            goamd64: v2
            output: bpfcat-linux-amd64-v2_sse
          - goarch: amd64
            goamd64: v3
            output: bpfcat-linux-amd64-v3_avx2
          - goarch: arm64
            goarm: ""
            output: bpfcat-linux-arm64
          - goarch: 386
            goarm: ""
            output: bpfcat-linux-386
          - goarch: riscv64
            goarm: ""
            output: bpfcat-linux-riscv64
          - goarch: loong64
            goarm: ""
            output: bpfcat-linux-loong64
          - goarch: mips64
            goarm: ""
            output: bpfcat-linux-mips64
          - goarch: mips64le
            goarm: ""
            output: bpfcat-linux-mips64le
          - goarch: mipsle
            goarm: ""
            output: bpfcat-linux-mipsle
          - goarch: mips
            goarm: ""
            output: bpfcat-linux-mips
          - goarch: ppc64
            goarm: ""
            output: bpfcat-linux-ppc64
          - goarch: ppc64le
            goarm: ""
            output: bpfcat-linux-ppc64le
          - goarch: s390x
            goarm: ""
            output: bpfcat-linux-s390x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Build release binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            GOAMD64=${{ matrix.goamd64 }} make build GOOS=linux GOARCH=${{ matrix.goarch }} OUTPUT=dist/${{ matrix.output }}
          elif [ -n "${{ matrix.goarm }}" ]; then
            make build GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} OUTPUT=dist/${{ matrix.output }}
          else
            make build GOOS=linux GOARCH=${{ matrix.goarch }} OUTPUT=dist/${{ matrix.output }}
          fi

      - name: Verify release binary
        run: test -f dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release-assets
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
